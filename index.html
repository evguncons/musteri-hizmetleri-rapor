<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otomatik Performans Raporu | Hedef AVM</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- html2pdf.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985' },
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; color: #334155; }
        .input-label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #64748b; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
        .input-field { width: 100%; padding: 0.75rem 1rem; font-size: 0.95rem; font-weight: 600; color: #1e293b; background-color: #f8fafc; border: 1px solid #cbd5e1; border-radius: 0.75rem; outline: none; transition: all 0.2s; cursor: pointer; }
        .input-field:focus { background-color: #ffffff; border-color: #0ea5e9; box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1); }
        .card { background: white; border-radius: 1.25rem; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02); }
        
        /* Select element oku için */
        .select-field {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2364748b' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 1rem center;
            background-repeat: no-repeat;
            background-size: 1.25em 1.25em;
        }

        .loader-spinner { border: 4px solid #f1f5f9; border-top: 4px solid #0ea5e9; border-radius: 50%; width: 3rem; height: 3rem; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen py-10 px-4 relative">

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="fixed inset-0 z-[90] bg-slate-100 flex items-center justify-center p-4">
        <div class="bg-white p-8 md:p-10 rounded-3xl shadow-2xl border border-slate-200 w-full max-w-md text-center">
            <div class="w-20 h-20 bg-gradient-to-br from-brand-600 to-indigo-700 rounded-2xl flex items-center justify-center shadow-lg shadow-brand-200 text-white mx-auto mb-6 transform rotate-3">
                <i class="fas fa-lock text-3xl"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-2">HEDEF AVM</h2>
            <p class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-8">OTOMATİK RAPOR SİSTEMİ</p>
            
            <form id="loginForm" class="space-y-4">
                <div class="relative">
                    <i class="fas fa-key absolute left-4 top-4 text-slate-400"></i>
                    <input type="password" id="loginPass" class="input-field pl-10 h-12 text-lg text-center tracking-widest placeholder:tracking-normal placeholder:text-sm" placeholder="Şifrenizi Giriniz">
                </div>
                <button type="submit" class="w-full h-12 bg-brand-500 hover:bg-brand-600 text-white font-bold rounded-xl shadow-lg shadow-brand-200/50 transition-all text-base">GİRİŞ YAP</button>
            </form>
            <p id="loginError" class="text-rose-500 text-xs font-bold mt-4 hidden"><i class="fas fa-exclamation-circle mr-1"></i> Hatalı Şifre!</p>
        </div>
    </div>

    <!-- YÜKLEME EKRANI -->
    <div id="loadingOverlay" class="fixed inset-0 z-50 bg-slate-900/40 backdrop-blur-sm flex flex-col items-center justify-center transition-all duration-300 hidden">
        <div class="bg-white p-8 rounded-3xl shadow-2xl flex flex-col items-center text-center max-w-sm w-full">
            <div class="loader-spinner mb-4"></div>
            <h3 class="text-xl font-bold text-slate-800">Veriler Çekiliyor</h3>
            <p class="text-sm text-slate-500 font-medium mt-2">Sistemdeki güncel kayıtlar analiz ediliyor, lütfen bekleyin...</p>
        </div>
    </div>

    <!-- ANA UYGULAMA (Girişten Sonra Görünür) -->
    <div id="mainApp" class="max-w-4xl mx-auto hidden">
        <!-- HEADER -->
        <header class="flex flex-col md:flex-row items-center justify-between gap-4 mb-8 bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-gradient-to-br from-brand-600 to-indigo-700 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-brand-200 transform rotate-3">
                    <i class="fas fa-chart-line text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black text-slate-800 tracking-tight">Performans Raporu</h1>
                    <p class="text-slate-500 font-bold text-sm tracking-wide uppercase mt-1">OTOMATİK VERİ ÇEKİM SİSTEMİ</p>
                </div>
            </div>
            <button onclick="fetchData()" class="px-5 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition-colors text-sm flex items-center gap-2">
                <i class="fas fa-sync-alt text-brand-600"></i> Verileri Yenile
            </button>
        </header>

        <!-- FILTERS -->
        <div class="card p-6 md:p-8 mb-8">
            <div class="flex items-center gap-3 mb-6 pb-4 border-b border-slate-100">
                <div class="w-8 h-8 rounded-lg bg-slate-100 text-slate-500 flex items-center justify-center"><i class="fas fa-filter"></i></div>
                <h2 class="text-lg font-bold text-slate-800">Filtreler</h2>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="input-label">Temsilci Seçin</label>
                    <select id="agentFilter" class="input-field select-field" onchange="updateDashboard()">
                        <option value="all">Tüm Temsilciler</option>
                    </select>
                </div>
                <div>
                    <label class="input-label">Dönem Seçin</label>
                    <select id="periodFilter" class="input-field select-field" onchange="updateDashboard()">
                        <option value="all">Tüm Zamanlar</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- DASHBOARD (Özet Görüntü) -->
        <div class="card p-6 md:p-8 mb-8">
            <div class="flex items-center justify-between mb-6 pb-4 border-b border-slate-100">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-indigo-50 text-indigo-500 flex items-center justify-center"><i class="fas fa-tachometer-alt"></i></div>
                    <h2 class="text-lg font-bold text-slate-800">Önizleme İstatistikleri</h2>
                </div>
                <span id="recordCountBadge" class="bg-slate-100 text-slate-600 px-3 py-1 rounded-lg text-xs font-bold border border-slate-200">0 Kayıt</span>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                <div class="bg-slate-50 border border-slate-200 rounded-2xl p-5 text-center">
                    <div class="text-slate-500 text-xs font-extrabold uppercase tracking-widest mb-2">Toplam Çağrı</div>
                    <div id="statTotal" class="text-3xl font-black text-slate-800">0</div>
                </div>
                <div class="bg-emerald-50 border border-emerald-100 rounded-2xl p-5 text-center">
                    <div class="text-emerald-600 text-xs font-extrabold uppercase tracking-widest mb-2">Çözümlenen</div>
                    <div id="statResolved" class="text-3xl font-black text-emerald-700">0</div>
                </div>
                <div class="bg-amber-50 border border-amber-100 rounded-2xl p-5 text-center">
                    <div class="text-amber-600 text-xs font-extrabold uppercase tracking-widest mb-2">Tekrar / Bekleyen</div>
                    <div id="statPending" class="text-3xl font-black text-amber-700">0</div>
                </div>
                <div class="bg-brand-50 border border-brand-100 rounded-2xl p-5 text-center flex flex-col justify-center">
                    <div class="text-brand-600 text-xs font-extrabold uppercase tracking-widest mb-2">Çözüm Oranı</div>
                    <div id="statRate" class="text-3xl font-black text-brand-700">%0</div>
                </div>
            </div>

            <div class="border-t border-slate-100 pt-6">
                <button onclick="generatePDF()" id="pdfBtn" class="w-full py-4 bg-rose-500 hover:bg-rose-600 text-white font-bold rounded-xl shadow-lg shadow-rose-200 transition-all flex items-center justify-center gap-3 text-lg">
                    <i class="fas fa-file-pdf text-xl"></i> Seçili Filtrelere Göre PDF Raporu Oluştur
                </button>
            </div>
        </div>
    </div>

    <!-- JS LOGIC -->
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzmh0TtUPRgqXpX3mZ7OvytgEg--MBKheEA46hXl7gLTjc23wEahTGugctfGopeikjI4g/exec";
        let allData = [];
        let filteredData = [];

        // GİRİŞ KONTROLÜ
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const pass = document.getElementById('loginPass').value;
            if(pass === '134679') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainApp').classList.remove('hidden');
                fetchData(); // Sadece şifre doğruysa verileri çek
            } else {
                document.getElementById('loginError').classList.remove('hidden');
                document.getElementById('loginPass').classList.add('border-rose-500', 'ring-2', 'ring-rose-200');
            }
        });

        async function fetchData() {
            const overlay = document.getElementById('loadingOverlay');
            overlay.classList.remove('hidden');
            
            try {
                // Cache engellemek için parametre ekle
                const targetUrl = `${API_URL}${API_URL.includes('?') ? '&' : '?'}t=${new Date().getTime()}`;
                const response = await fetch(targetUrl);
                const rawData = await response.json();
                
                // Verileri temizle
                allData = rawData.filter(item => {
                    const m = (item.musteri || "").toString().trim();
                    const d = (item.tarih || "").toString().trim();
                    if (m === "" || d === "" || d === "undefined") return false;
                    const mLower = m.toLowerCase();
                    if (mLower.includes("ad soyad") || mLower.includes("müşteri") || mLower === "adı soyadı") return false;
                    return true;
                }).map(item => ({
                    tarih: item.tarih, 
                    musteri: item.musteri, 
                    telefon: String(item.telefon || ""), 
                    konu: item.konu, 
                    durum: item.durum, 
                    temsilci: String(item.temsilci || "").trim().toUpperCase(), 
                    bolge: item.bolge, 
                    donem: item.donem
                }));

                populateDropdowns();
                updateDashboard();

            } catch(e) {
                console.error("Veri çekme hatası:", e);
                alert("Veriler çekilirken bir hata oluştu. Lütfen sayfayı yenileyin.");
            } finally {
                overlay.classList.add('hidden');
            }
        }

        function populateDropdowns() {
            const agentSelect = document.getElementById('agentFilter');
            const periodSelect = document.getElementById('periodFilter');

            const currentAgent = agentSelect.value;
            const currentPeriod = periodSelect.value;

            const agents = [...new Set(allData.map(d => d.temsilci).filter(d => d))].sort();
            agentSelect.innerHTML = '<option value="all">Tüm Temsilciler</option>' + agents.map(a => `<option value="${a}">${a}</option>`).join('');
            if(agents.includes(currentAgent)) agentSelect.value = currentAgent;

            const periods = [...new Set(allData.map(d => d.donem).filter(d => d))].sort();
            periodSelect.innerHTML = '<option value="all">Tüm Zamanlar</option>' + periods.map(p => `<option value="${p}">${p}</option>`).join('');
            if(periods.includes(currentPeriod)) periodSelect.value = currentPeriod;
        }

        function updateDashboard() {
            const agentVal = document.getElementById('agentFilter').value;
            const periodVal = document.getElementById('periodFilter').value;

            filteredData = allData;
            if (agentVal !== 'all') filteredData = filteredData.filter(d => d.temsilci === agentVal);
            if (periodVal !== 'all') filteredData = filteredData.filter(d => d.donem === periodVal);

            const total = filteredData.length;
            const resolved = filteredData.filter(d => (d.durum || "").match(/ÇÖZÜMLENDİ|MEMNUN|İBAN/i)).length;
            const pending = filteredData.filter(d => (d.durum || "").toUpperCase().includes("TEKRAR")).length;
            const successRate = total > 0 ? Math.round((resolved / total) * 100) : 0;

            document.getElementById('statTotal').textContent = total;
            document.getElementById('statResolved').textContent = resolved;
            document.getElementById('statPending').textContent = pending;
            document.getElementById('statRate').textContent = `%${successRate}`;
            document.getElementById('recordCountBadge').textContent = `${total} Kayıt`;
        }

        function formatDisplayDate(raw) {
            if (!raw) return "-";
            const str = String(raw);
            if (str.includes('T')) {
                const parts = str.split('T');
                const d = parts[0].split('-');
                return `${d[2]}.${d[1]}.${d[0]}`; 
            }
            if (str.match(/^\d{4}-\d{2}-\d{2}$/)) {
                const p = str.split('-');
                return `${p[2]}.${p[1]}.${p[0]}`;
            }
            return str;
        }

        function generatePDF() {
            if(filteredData.length === 0) {
                alert("Seçili filtrelere uygun kayıt bulunamadı. Rapor oluşturulamaz.");
                return;
            }

            const agentSelect = document.getElementById('agentFilter');
            const periodSelect = document.getElementById('periodFilter');
            const agentText = agentSelect.options[agentSelect.selectedIndex].text;
            const periodText = periodSelect.options[periodSelect.selectedIndex].text;
            
            const totalCalls = document.getElementById('statTotal').textContent;
            const resolvedCalls = document.getElementById('statResolved').textContent;
            const pendingCalls = document.getElementById('statPending').textContent;
            const successRate = document.getElementById('statRate').textContent.replace('%', '');

            const content = document.createElement('div');
            content.style.position = 'absolute';
            content.style.top = '0';
            content.style.left = '0';
            content.style.zIndex = '-9999';
            content.style.width = '800px'; 
            content.style.backgroundColor = '#ffffff';
            document.body.appendChild(content);

            // ÇÖKME VE DONMA ENGELLEYİCİ - Maksimum 100 kayıt
            const MAX_ROWS = 100;
            const dataToRender = filteredData.slice(0, MAX_ROWS);
            
            let warningHTML = "";
            if (filteredData.length > MAX_ROWS) {
                warningHTML = `
                <div style="background-color: #fef2f2; border: 1px dashed #ef4444; color: #b91c1c; padding: 12px; border-radius: 8px; text-align: center; font-size: 11px; font-weight: bold; margin-bottom: 15px;">
                    DİKKAT: Veri boyutunun PDF sayfa sınırlarını aşmaması için aşağıdaki detay listesinde sadece son ${MAX_ROWS} çağrı gösterilmektedir. Yukarıdaki istatistik kutuları ${filteredData.length} çağrının tamamını kapsamaktadır.
                </div>`;
            }

            const tableRows = dataToRender.map(item => `
                <tr style="page-break-inside: avoid; border-bottom: 1px solid #f1f5f9;">
                    <td style="padding: 8px 10px; font-size: 11px; color: #64748b;">${formatDisplayDate(item.tarih)}</td>
                    <td style="padding: 8px 10px; font-size: 11px; font-weight: bold; color: #1e293b;">${item.musteri}</td>
                    <td style="padding: 8px 10px; font-size: 11px; color: #475569;">${item.konu || '-'}</td>
                    <td style="padding: 8px 10px; font-size: 11px; font-weight: bold; color: #0f172a;">${item.durum || '-'}</td>
                    <td style="padding: 8px 10px; font-size: 11px; color: #64748b;">${item.bolge || '-'}</td>
                </tr>
            `).join('');

            content.innerHTML = `
                <div style="padding: 40px; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #1e293b; background: white;">
                    
                    <div style="text-align: center; border-bottom: 3px solid #0ea5e9; padding-bottom: 15px; margin-bottom: 30px;">
                        <h1 style="color: #0369a1; font-size: 26px; font-weight: 800; margin: 0; letter-spacing: 1px;">HEDEF AVM</h1>
                        <h2 style="color: #64748b; font-size: 14px; margin: 5px 0 0 0; text-transform: uppercase; letter-spacing: 2px;">Performans Özeti</h2>
                    </div>

                    <div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px 20px; margin-bottom: 30px; display: flex; justify-content: space-between;">
                        <div>
                            <p style="margin: 0; font-size: 11px; color: #64748b; font-weight: bold; text-transform: uppercase;">Temsilci</p>
                            <p style="margin: 3px 0 0 0; font-size: 16px; font-weight: bold; color: #0f172a;">${agentText}</p>
                        </div>
                        <div style="text-align: right;">
                            <p style="margin: 0; font-size: 11px; color: #64748b; font-weight: bold; text-transform: uppercase;">Rapor Dönemi</p>
                            <p style="margin: 3px 0 0 0; font-size: 16px; font-weight: bold; color: #0f172a;">${periodText}</p>
                        </div>
                    </div>

                    <div style="display: flex; gap: 15px; margin-bottom: 30px;">
                        <div style="flex: 1; padding: 15px; background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; text-align: center;">
                            <div style="font-size: 11px; color: #3b82f6; font-weight: bold; text-transform: uppercase; margin-bottom: 5px;">Toplam Çağrı</div>
                            <div style="font-size: 24px; font-weight: 800; color: #1e3a8a;">${totalCalls}</div>
                        </div>
                        <div style="flex: 1; padding: 15px; background: #ecfdf5; border: 1px solid #a7f3d0; border-radius: 8px; text-align: center;">
                            <div style="font-size: 11px; color: #10b981; font-weight: bold; text-transform: uppercase; margin-bottom: 5px;">Çözümlenen</div>
                            <div style="font-size: 24px; font-weight: 800; color: #064e3b;">${resolvedCalls}</div>
                        </div>
                        <div style="flex: 1; padding: 15px; background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; text-align: center;">
                            <div style="font-size: 11px; color: #f59e0b; font-weight: bold; text-transform: uppercase; margin-bottom: 5px;">Bekleyen</div>
                            <div style="font-size: 24px; font-weight: 800; color: #78350f;">${pendingCalls}</div>
                        </div>
                    </div>

                    <div style="margin-bottom: 30px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                            <span style="font-size: 12px; font-weight: bold; color: #334155;">Genel Çözüm Oranı</span>
                            <span style="font-size: 14px; font-weight: bold; color: #10b981;">%${successRate}</span>
                        </div>
                        <div style="width: 100%; background-color: #e2e8f0; border-radius: 8px; height: 10px; overflow: hidden;">
                            <div style="width: ${successRate}%; background-color: #10b981; height: 100%; border-radius: 8px;"></div>
                        </div>
                    </div>

                    ${warningHTML}

                    <h3 style="font-size: 14px; color: #0f172a; border-bottom: 2px solid #f1f5f9; padding-bottom: 5px; margin-bottom: 10px; font-weight: bold;">Detaylı Çağrı Listesi</h3>
                    <table style="width: 100%; border-collapse: collapse; text-align: left;">
                        <thead>
                            <tr style="background-color: #f1f5f9;">
                                <th style="padding: 10px; font-size: 11px; color: #475569; font-weight: 800; text-transform: uppercase;">Tarih</th>
                                <th style="padding: 10px; font-size: 11px; color: #475569; font-weight: 800; text-transform: uppercase;">Müşteri</th>
                                <th style="padding: 10px; font-size: 11px; color: #475569; font-weight: 800; text-transform: uppercase;">Konu</th>
                                <th style="padding: 10px; font-size: 11px; color: #475569; font-weight: 800; text-transform: uppercase;">Durum</th>
                                <th style="padding: 10px; font-size: 11px; color: #475569; font-weight: 800; text-transform: uppercase;">Bölge</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tableRows}
                        </tbody>
                    </table>

                    <div style="margin-top: 40px; text-align: center; color: #94a3b8; font-size: 10px; border-top: 1px solid #e2e8f0; padding-top: 15px;">
                        Rapor Oluşturulma Tarihi: ${new Date().toLocaleDateString('tr-TR')} ${new Date().toLocaleTimeString('tr-TR')} | Otomatik Üretilmiştir.
                    </div>
                </div>
            `;

            const safeAgent = agentText === 'Tüm Temsilciler' ? 'Genel' : agentText.replace(/\s+/g, '_');
            const safePeriod = periodText === 'Tüm Zamanlar' ? 'Genel' : periodText.replace(/\s+/g, '_');

            const opt = {
                margin:       10,
                filename:     `Performans_${safeAgent}_${safePeriod}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            const btn = document.getElementById('pdfBtn');
            const oldText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin text-xl"></i> Hazırlanıyor...';
            btn.disabled = true;

            setTimeout(() => {
                html2pdf().set(opt).from(content).save().then(() => {
                    btn.innerHTML = oldText;
                    btn.disabled = false;
                    document.body.removeChild(content);
                }).catch(err => {
                    console.error("PDF Hatası:", err);
                    btn.innerHTML = oldText;
                    btn.disabled = false;
                    if(document.body.contains(content)) document.body.removeChild(content);
                    alert("PDF oluşturulurken bir hata oluştu.");
                });
            }, 300);
        }
    </script>
</body>
</html>
